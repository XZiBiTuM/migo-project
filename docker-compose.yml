services:
  db:
      image: postgres:15-alpine
      volumes:
          - ./db_data:/var/lib/postgresql/data
      environment:
          - POSTGRES_DB=migo_db
          - POSTGRES_USER=migo_user
          - POSTGRES_PASSWORD=migo_password
      healthcheck:
          test: ["CMD-SHELL", "pg_isready -U migo_user -d migo_db"]
          interval: 10s
          timeout: 5s
          retries: 5

  backend:
      build:
          context: .
          dockerfile: Dockerfile.backend
      depends_on:
          db:
              condition: service_healthy
      environment:
          - DATABASE_URL=postgres://migo_user:migo_password@db:5432/migo_db
          - SECRET_KEY=django-insecure-migo-production-key-change-it
          - DEBUG=False
          - ALLOWED_HOSTS=api.migo.ru,migo.ru,backend
          - BOT_TOKEN=8681056695:AAE9DsSiCKAZEaIo-yjtQVu_dKMTUEZLa8I
      volumes:
          - ./media:/app/media
          - ./static:/app/static
      command: gunicorn --bind 0.0.0.0:8000 migo.wsgi:application

  tg_bot:
      build:
          context: .
          dockerfile: Dockerfile.backend
      depends_on:
          db:
              condition: service_healthy
      environment:
          - DATABASE_URL=postgres://migo_user:migo_password@db:5432/migo_db
          - BOT_TOKEN=8681056695:AAE9DsSiCKAZEaIo-yjtQVu_dKMTUEZLa8I
          - DJANGO_SETTINGS_MODULE=migo.settings
      command: python tg_bot/bot.py

  frontend:
      build:
          context: .
          dockerfile: Dockerfile.frontend
          args:
              - NEXT_PUBLIC_API_URL=https://api.migo.ru
      environment:
          - NEXT_PUBLIC_BOT_URL=https://t.me/migo_work

  nginx:
      image: nginx:alpine
      ports:
          - "80:80"
          - "443:443"
      volumes:
          - ./nginx/migo.conf:/etc/nginx/conf.d/default.conf
          - ./static:/app/static
          - ./media:/app/media
          - ./certs:/etc/nginx/certs
      depends_on:
          - backend
          - frontend
